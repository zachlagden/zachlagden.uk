version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    # Limit the number of open pull requests for npm dependencies
    open-pull-requests-limit: 5
    # Reviewers to request for dependency updates
    reviewers:
      - "zachlagden"
    # Assignees for dependency updates
    assignees:
      - "zachlagden"
    # Labels to add to dependency update PRs
    labels:
      - "dependencies"
      - "npm"
    # Commit message prefix
    commit-message:
      prefix: "⬆️"
      include: "scope"
    # Group related updates
    groups:
      next-ecosystem:
        patterns:
          - "next*"
          - "@next/*"
          - "react*"
          - "@types/react*"
        # next-auth must never bundle with the Next/React batch — it has its
        # own ignore rule below and a manual CVE-only bump protocol (D-04).
        exclude-patterns:
          - "next-auth"
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "typescript"
          - "autoprefixer"
          - "postcss"
          - "tailwindcss*"
        update-types:
          - "minor"
          - "patch"
      security-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"
        # Even security advisories for these deps must be handled standalone
        # so the manual smoke-test discipline (D-01 / D-04) is preserved.
        exclude-patterns:
          - "next-auth"
          - "framer-motion"
          - "pnpm"
    # Ignore specific dependencies that need manual updates
    ignore:
      - dependency-name: "node"
        # Ignore major version updates for Node.js
        update-types: ["version-update:semver-major"]
      # Pitfall 2 — beta-to-beta OAuth contract change. Manual CVE-only bump,
      # gated by AUTH-SMOKE-TEST.md.
      - dependency-name: "next-auth"
      # Pitfall 1 — intro state machine FSM. Patch-only; package.json range
      # pinned to ~12.23.26 in Plan 05 Batch C.
      - dependency-name: "framer-motion"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      # Defends packageManager: pnpm@10.33.0 pin (commit 41657a0) from
      # Coolify Corepack mismatch.
      - dependency-name: "pnpm"
        update-types:
          - "version-update:semver-major"
    # Auto-merge configuration for minor and patch updates
    rebase-strategy: "auto"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "⬆️"
      include: "scope"
